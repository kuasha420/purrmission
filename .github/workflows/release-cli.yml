name: Release Pawthy CLI

on:
  push:
    tags:
      - 'pawthy-v*'
  workflow_dispatch:

jobs:
  publish-gpr:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@kuasha420'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter pawthy build

      - name: Update package name for GPR
        run: npm pkg set name="@kuasha420/pawthy"
        working-directory: apps/pawthy

      - name: Publish to GPR
        run: npm publish --no-provenance
        working-directory: apps/pawthy
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter pawthy build

      - name: Publish to NPM
        run: npm publish --provenance --access public
        working-directory: apps/pawthy
